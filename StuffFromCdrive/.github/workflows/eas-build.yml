name: EAS Preview Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options: [all, android, ios]

jobs:
  cancel-pending:
    name: Cancel pending preview builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Cancel queued/in-progress preview builds
        working-directory: mobile
        run: |
          # Valid EAS statuses: new | in-queue | in-progress | finished | errored | canceled
          # Previous version used --status=waiting which is not a real status — builds were
          # slipping through. Single list call + jq filter is more reliable.
          BUILDS=$(eas build:list --profile=preview --json --non-interactive --limit=20 2>/dev/null \
            | jq -r '.[] | select(.status | IN("new", "in-queue", "in-progress")) | .id' || true)
          for id in $BUILDS; do
            echo "Cancelling build $id"
            eas build:cancel $id --non-interactive || true
          done

  android:
    name: Android — Preview APK
    runs-on: ubuntu-latest
    needs: cancel-pending
    if: ${{ !inputs.platform || inputs.platform == 'all' || inputs.platform == 'android' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
        working-directory: mobile
      - name: Verify EAS auth
        working-directory: mobile
        run: eas whoami
      - run: eas build --platform android --profile preview --non-interactive --no-wait
        working-directory: mobile

  ios:
    name: iOS — Preview IPA
    runs-on: ubuntu-latest
    needs: cancel-pending
    if: ${{ !inputs.platform || inputs.platform == 'all' || inputs.platform == 'ios' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
        working-directory: mobile
      - name: Verify EAS auth
        working-directory: mobile
        run: eas whoami
      - run: eas build --platform ios --profile preview --non-interactive --no-wait
        working-directory: mobile
