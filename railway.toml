# Railway deployment config
# Three services are deployed from this repo:
#   1. api        — FastAPI HTTP server (this file)
#   2. sat-worker — satellite tracking background worker (separate Railway service)
#   3. osm-seeder — one-shot OSM road seeder (run manually or as Railway cron)
#
# To create the worker services in Railway:
#   railway service create sat-worker
#   railway service create osm-seeder
# Start commands are set via startCommand in each service's toml file.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

watchPatterns = ["backend/**", "railway.toml"]

# ---------------------------------------------------------------------------
# Seeder service: in Railway dashboard → service Settings → Config Path
#   set to railway.seeder.toml
# ---------------------------------------------------------------------------
